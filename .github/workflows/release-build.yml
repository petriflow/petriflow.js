# CD pipeline triggered when a new GitHub release is published.
# Builds and tests the project, then publishes the package to both
# the npm registry (as 'next' for pre-releases or 'latest' for stable releases)
# and the GitHub Package Registry.

name: Release NPM package

on:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm i
      - run: npm run build
      - run: npm run test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - name: Read version
        uses: zvonimirsun/read-package-version-actions@v2
        id: get_version
      - run: npm i
      - run: npm run build
      - name: Publish petriflow.js pre-release
        if: ${{ contains(steps.get_version.outputs.version,'-') }}
        run: npm publish --access public --tag next
      - name: Publish petriflow.js latest release
        if: ${{ !contains(steps.get_version.outputs.version,'-') }}
        run: npm publish --access public --tag latest

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
      - run: npm i
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
